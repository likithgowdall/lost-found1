
<!DOCTYPE html>
<html>
<head>
    <title>My Items</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <h2>📦 My Items</h2>

    <div id="items" class="row mt-4"></div>

</div>

<script>

async function load(){

    try{

        const res = await fetch('/items/my');

        /* not logged in */
        if(res.status === 401){

            alert("Please login first");

            location = "login.html";

            return;
        }

        const data = await res.json();

        /* empty */
        if(data.length === 0){

            items.innerHTML = `
                <h4>No items posted yet</h4>
            `;

            return;
        }

        items.innerHTML = data.map(item => `

            <div class="col-md-4 mb-3">

                <div class="card p-3">

                    <h5>${item.name}</h5>

                    <p>${item.description || ''}</p>

                    <span class="badge bg-dark">
                        ${item.category}
                    </span>

                    <span class="badge bg-${item.type === 'lost' ? 'danger':'success'}">
                        ${item.type}
                    </span>

                    <p class="mt-2">
                        📍 ${item.location || ""}
                    </p>

                    <p>
                        Status:
                        <b>${item.status}</b>
                    </p>

                    <br>

                    ${
                        item.image
                        ?
                        `<img src="/uploads/${item.image}" width="100%">`
                        :
                        ""
                    }

                </div>

            </div>

        `).join('');

    }catch(err){

        items.innerHTML = `
            <h4>Error loading items</h4>
        `;

        console.log(err);
    }
}

load();

</script>

</body>
</html>
