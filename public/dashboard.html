<!DOCTYPE html>
<html>
<head>
    <title>Lost & Found Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            transition:.3s;
        }

        body.dark{
            background:#1e1e2f;
            color:white;
        }

        .navbar{
            background:#667eea;
        }

        .navbar h3{
            color:white;
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:15px;
            margin-bottom:20px;
        }

        .stat-card{
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        body.dark .stat-card,
        body.dark .item-card,
        body.dark .card{
            background:#2a2a40;
            color:white;
        }

        .item-card{
            background:white;
            padding:15px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
            transition:.3s;
            height:100%;
        }

        .item-card:hover{
            transform:translateY(-5px);
        }

        img{
            border-radius:10px;
            object-fit:cover;
            height:220px;
        }

        .badge{
            margin-right:5px;
        }

        #toast{
            position:fixed;
            bottom:20px;
            right:20px;
            background:black;
            color:white;
            padding:10px 15px;
            border-radius:5px;
            display:none;
        }

        @media(max-width:600px){
            .navbar{
                flex-direction:column;
                text-align:center;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3 d-flex justify-content-between align-items-center">

    <h3>📦 Lost & Found Portal</h3>

    <div>
        <button class="btn btn-light btn-sm" onclick="go('home.html')">Home</button>

        <button class="btn btn-light btn-sm" onclick="go('profile.html')">Profile</button>

        <button class="btn btn-light btn-sm" onclick="go('myitems.html')">My Items</button>
<button
id="adminBtn"
style="display:none"
class="btn btn-warning btn-sm"
onclick="go('admin.html')">

Admin

</button>
        <button class="btn btn-light btn-sm" onclick="go('/notifications-page')">Notifications</button>

        <button class="btn btn-warning btn-sm" onclick="toggleDark()">🌙</button>

        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>

</nav>

<div class="container mt-4">

<!-- STATS -->
<div class="stats">

    <div class="stat-card">
        <h2 id="totalItems">0</h2>
        <p>Total Items</p>
    </div>

    <div class="stat-card">
        <h2 id="lostCount">0</h2>
        <p>Lost Items</p>
    </div>

    <div class="stat-card">
        <h2 id="foundCount">0</h2>
        <p>Found Items</p>
    </div>

</div>

<!-- POST ITEM -->
<div class="card p-3 mb-4">

    <h4>Post Lost / Found Item</h4>

    <input id="name" class="form-control mb-2" placeholder="Item Name">

    <input id="desc" class="form-control mb-2" placeholder="Description">

    <input id="location" class="form-control mb-2" placeholder="Location">

    <!-- CATEGORY -->
    <select id="category" class="form-control mb-2">
        <option>Electronics</option>
        <option>Wallet</option>
        <option>ID Card</option>
        <option>Books</option>
        <option>Bags</option>
        <option>Others</option>
    </select>

    <select id="type" class="form-control mb-2">
        <option value="lost">Lost</option>
        <option value="found">Found</option>
    </select>

    <input type="file" id="image" class="form-control mb-2">

    <button class="btn btn-primary" onclick="postItem()">
        Submit
    </button>

</div>

<!-- SEARCH -->
<input id="search"
class="form-control mb-3"
placeholder="🔍 Search items..."
onkeyup="loadItems()">

<!-- FILTERS -->
<div class="mb-3">

    <button class="btn btn-outline-danger btn-sm"
    onclick="filterType('lost')">
        Lost
    </button>

    <button class="btn btn-outline-success btn-sm"
    onclick="filterType('found')">
        Found
    </button>

    <button class="btn btn-outline-secondary btn-sm"
    onclick="loadItems()">
        All
    </button>

    <!-- CATEGORY FILTER -->
    <select onchange="filterCategory(this.value)"
    class="btn btn-light btn-sm">

        <option value="all">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Wallet">Wallet</option>
        <option value="ID Card">ID Card</option>
        <option value="Books">Books</option>
        <option value="Bags">Bags</option>

    </select>

</div>

<!-- CLAIMS -->
<h4 class="mt-4">My Claims</h4>

<div id="claims" class="mb-4"></div>

<!-- ITEMS -->
<div id="items" class="row"></div>

</div>

<div id="toast"></div>

<script>

let allItems = [];

/* TOAST */
function showToast(msg){
    toast.innerText = msg;
    toast.style.display = "block";

    setTimeout(()=>{
        toast.style.display = "none";
    },2000);
}

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* NAVIGATION */
function go(page){
    location = page;
}

/* POST ITEM */
async function postItem(){

    const formData = new FormData();

    formData.append("name",
        document.getElementById("name").value
    );

    formData.append("description",
        document.getElementById("desc").value
    );

    formData.append("location",
        document.getElementById("location").value
    );

    formData.append("category",
        document.getElementById("category").value
    );

    formData.append("type",
        document.getElementById("type").value
    );

    if(document.getElementById("image").files[0]){

        formData.append(
            "image",
            document.getElementById("image").files[0]
        );
    }

    const res = await fetch("/items", {

        method:"POST",

        body:formData
    });

    alert(await res.text());

    loadItems();
}
/* LOAD ITEMS */
async function loadItems(){

    items.innerHTML = "Loading...";

    const res = await fetch("/items?search=" + (search.value || ""));

    allItems = await res.json();

    updateStats();

    displayItems(allItems);
}

/* STATS */
function updateStats(){

    totalItems.innerText = allItems.length;

    lostCount.innerText =
        allItems.filter(i=>i.type==="lost").length;

    foundCount.innerText =
        allItems.filter(i=>i.type==="found").length;
}

/* DISPLAY */
function displayItems(data){

    items.innerHTML = "";

    if(data.length === 0){
        items.innerHTML = "<h5>No items found</h5>";
        return;
    }

    data.forEach(item=>{

        items.innerHTML += `
        <div class="col-md-4 mb-4">

            <div class="item-card">

                <h5>${item.name}</h5>

                <span class="badge bg-dark">
                    ${item.category || "Others"}
                </span>

                <span class="badge bg-${item.type==="lost" ? "danger":"success"}">
                    ${item.type.toUpperCase()}
                </span>

                <span class="badge bg-info">
                    ${item.status}
                </span>

                <p class="mt-2">
                    ${item.description || ""}
                </p>

                <p>
                    📍 ${item.location || ""}
                </p>

                ${
                    item.image
                    ?
                    `<img src="/uploads/${item.image}"
                    width="100%">`
                    :
                    ""
                }

                <br><br>

                <button
                class="btn btn-primary btn-sm"

                ${item.status==="claimed" ? "disabled":""}

                onclick="claimItem('${item._id}')">

                    ${
                        item.status==="claimed"
                        ?
                        "Already Claimed"
                        :
                        "Claim"
                    }

                </button>

                <button
                class="btn btn-danger btn-sm"

                onclick="deleteItem('${item._id}')">

                    Delete

                </button>

            </div>

        </div>
        `;
    });
}

/* FILTER */
function filterType(type){

    displayItems(
        allItems.filter(item=>item.type===type)
    );
}

/* CATEGORY FILTER */
function filterCategory(cat){

    if(cat==="all"){
        displayItems(allItems);
        return;
    }

    displayItems(
        allItems.filter(item=>item.category===cat)
    );
}

/* CLAIM */
async function claimItem(id){

    const res = await fetch("/claims/" + id,{
        method:"POST"
    });

    showToast(await res.text());

    loadItems();
    loadClaims();
}

/* CLAIMS */
async function loadClaims(){

    const res = await fetch("/claims");

    const data = await res.json();

    claims.innerHTML = data.map(c=>`

        <div class="card p-2 mb-2">

            Claim ID:
            ${c._id}

            <br>

            Status:
            <b>${c.status}</b>

        </div>

    `).join("");
}

/* DELETE */
async function deleteItem(id){

    const ok = confirm("Delete item?");

    if(!ok) return;

    const res = await fetch("/items/" + id,{
        method:"DELETE"
    });

    showToast(await res.text());

    loadItems();
}

/* LOGOUT */
async function logout(){

    await fetch("/auth/logout");

    location="/";
}
async function checkAdmin(){

    const res = await fetch('/auth/me');

    const data = await res.json();

    if(data.role === "admin"){

        document.getElementById("adminBtn")
        .style.display = "inline-block";
    }
}

checkAdmin();

/* INIT */
loadItems();
loadClaims();

</script>

</body>
</html>
